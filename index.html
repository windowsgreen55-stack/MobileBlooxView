<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlooxView - Mobile</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header responsivo */
        #header { 
            background: #fff; 
            border-bottom: 1px solid #2ecc71; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        #logo img { height: 30px; object-fit: contain; cursor: pointer; }

        .nav button { background: #2ecc71; border: none; color: #fff; font-weight: bold; cursor: pointer; padding: 6px 12px; border-radius: 4px; margin-left: 5px; font-size: 14px; }
        
        /* Container flexível */
        .container { width: 100%; box-sizing: border-box; padding: 15px; min-height: 80vh; }
        
        .site-banner { padding: 8px; border: 1px dashed #2ecc71; margin-bottom: 15px; text-align: center; font-size: 13px; font-weight: bold; color: #333; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        /* Ajuste do player para mobile */
        .video-wrapper { 
            width: 100%; 
            aspect-ratio: 16 / 9; /* Mantém proporção em qualquer tela */
            background: #000; 
            border: 1px solid #2ecc71; 
            position: relative; 
            margin: 0 auto;
        }
        #custom-player-frame { width: 100%; height: 100%; border: none; }
        
        /* Grid responsiva: 2 colunas no celular, mais no PC */
        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
        }
        
        @media (min-width: 768px) {
            #video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .container { max-width: 1100px; margin: 0 auto; }
        }

        .v-card { cursor: pointer; border: 1px solid #eee; padding: 5px; border-radius: 4px; }
        .v-card img { width: 100%; aspect-ratio: 16/9; background: #000; object-fit: cover; border-radius: 2px; }
        .v-card .title { font-size: 12px; font-weight: bold; color: #2ecc71; margin-top: 5px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Formulário Mobile */
        .upload-form input, .upload-form textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; box-sizing: border-box; border-radius: 4px; font-size: 16px; /* Evita zoom no iPhone */ }
        .btn-post { width: 100%; padding: 15px; background: #2ecc71; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        .back-btn { background: #eee; border: 1px solid #ccc; padding: 8px 15px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; width: 100%; text-align: left; }
    </style>
</head>
<body>
    <div id="header">
        <div id="logo" onclick="nav('home')">
            <img src="https://i.picasion.com/pic93/abbb57142c6e7e4b6661ad50177fe656.gif" alt="BlooxView"> 
        </div>
        <div class="nav">
            <button onclick="nav('home')">Home</button>
            <button onclick="nav('upload')">Upload</button>
        </div>
    </div>

    <div class="container">
        <div class="site-banner">Share your world! BlooxView Mobile</div>

        <div id="home" class="page active">
            <h2 style="font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Featured</h2>
            <div id="video-grid">Carregando...</div>
        </div>

        <div id="watch" class="page">
            <button class="back-btn" onclick="nav('home')">« Voltar</button>
            <div class="video-wrapper">
                <iframe id="custom-player-frame" src="player.html" allowfullscreen></iframe>
            </div>
            <div class="video-details">
                <h1 id="v-title" style="font-size: 18px; margin: 10px 0 5px 0;"></h1>
                <p id="v-desc" style="font-size: 14px; color: #666;"></p>
            </div>
        </div>

        <div id="upload" class="page">
            <h2>Upload Video</h2>
            <div class="upload-form">
                <input type="text" id="in-title" placeholder="Título do Vídeo">
                <input type="text" id="in-url" placeholder="Link do Vídeo (mp4/Catbox)">
                <input type="text" id="in-thumb" placeholder="URL da Thumbnail">
                <textarea id="in-desc" placeholder="Descrição" rows="4"></textarea>
                <button class="btn-post" id="btn-publish">Publicar Vídeo</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
        
        const app = initializeApp({
            apiKey: "AIzaSyDCHSKOqDGNseVrvdFxndFx3VYAQF3nV48",
            authDomain: "yt2009-dbeb8.firebaseapp.com",
            databaseURL: "https://yt2009-dbeb8-default-rtdb.firebaseio.com",
            projectId: "yt2009-dbeb8"
        });
        const db = getDatabase(app);

        window.nav = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            if(id !== 'watch') document.getElementById('custom-player-frame').src = "player.html";
        };

        onValue(ref(db, "videos"), snap => {
            const grid = document.getElementById("video-grid");
            grid.innerHTML = "";
            snap.forEach(child => {
                const v = child.val();
                const el = document.createElement("div");
                el.className = "v-card";
                el.innerHTML = `<img src="${v.thumbnail || 'https://via.placeholder.com/160x90?text=No+Thumb'}"><span class="title">${v.title}</span>`;
                el.onclick = () => {
                    nav('watch');
                    document.getElementById('v-title').innerText = v.title;
                    document.getElementById('v-desc').innerText = v.description || "";
                    const frame = document.getElementById('custom-player-frame');
                    frame.src = `player.html?video=${encodeURIComponent(v.url)}`;
                };
                grid.appendChild(el);
            });
        });

        document.getElementById('btn-publish').onclick = () => {
            const title = document.getElementById('in-title').value;
            const url = document.getElementById('in-url').value;
            const thumb = document.getElementById('in-thumb').value;
            const desc = document.getElementById('in-desc').value;
            if(!title || !url) return alert("Título e Link são obrigatórios!");
            push(ref(db, "videos"), { title, url, thumbnail: thumb, description: desc })
                .then(() => { 
                    alert("Vídeo publicado!"); 
                    document.querySelectorAll('input, textarea').forEach(i => i.value = "");
                    nav('home'); 
                });
        };
    </script>
</body>
</html>
